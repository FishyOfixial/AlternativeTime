services:
  - type: web
    name: alternative-time-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .env.example
    envVars:
      - key: APP_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: alternative-time-db
          property: connectionString
      - key: POSTGRES_SSL_REQUIRE
        value: "True"
      - key: DJANGO_ALLOWED_HOSTS
        value: 127.0.0.1,localhost,alternative-time-api.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://alternative-time-web.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: http://localhost:5173,http://alternative-time-web.onrender.com
      - key: FRONTEND_HOST
        value: alternative-time-web.onrender.com
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ALTERNATIVE_TIME_BUSINESS_NAME
        value: Alternative Time

  - type: cron
    name: alternative-time-birthday-notifications
    runtime: python
    plan: starter
    rootDir: backend
    schedule: "0 14 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py notify_birthdays
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .env.example
    envVars:
      - key: APP_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: alternative-time-db
          property: connectionString
      - key: POSTGRES_SSL_REQUIRE
        value: "True"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ALTERNATIVE_TIME_BUSINESS_NAME
        value: Alternative Time

  - type: web
    name: alternative-time-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        value: alternative-time-api.onrender.com

databases:
  - name: alternative-time-db
    plan: basic-256mb
