services:
  - type: web
    name: alternative-time-api-dev
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .env.example
    envVars:
      - key: APP_ENV
        value: staging
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_ENGINE
        value: sqlite
      - key: SQLITE_NAME
        value: db.dev.sqlite3
      - key: DJANGO_ALLOWED_HOSTS
        value: 127.0.0.1,localhost,alternative-time-api-dev.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://alternative-time-web-dev.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: http://localhost:5173,http://alternative-time-web-dev.onrender.com
      - key: FRONTEND_HOST
        value: alternative-time-web-dev.onrender.com

  - type: web
    name: alternative-time-web-dev
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        value: alternative-time-api-dev.onrender.com
